<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Color Palette Laboratory</title>
  <link rel="stylesheet" href="assets/styles.css">
</head>
<body>
  <main>
    <aside class="panel">
      <h1>Palette Lab</h1>
      <p>Generate harmonies from a base color or extract a palette from an uploaded image.</p>
      <label>Base color<input id="base" type="color" value="#22c55e"></label>
      <label>Harmony<select id="mode"><option value="complementary">Complementary</option><option value="triadic">Triadic</option><option value="analogous">Analogous</option><option value="mono">Monochrome</option></select></label>
      <div class="drop" id="drop">Drop an image or choose a file<br><input id="file" type="file" accept="image/*"></div>
      <button id="copy">Copy CSS</button>
      <textarea id="css" spellcheck="false"></textarea>
      <canvas id="canvas"></canvas>
    </aside>
    <section>
      <div class="palette" id="palette"></div>
      <div class="preview" id="preview"></div>
    </section>
  </main>
  <script src="assets/app.js" defer></script>
</body>
</html>
