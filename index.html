<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Color Palette Laboratory</title>
  <style>
    :root { color-scheme: dark; --bg:#121417; --panel:#1c2027; --text:#f7f7f4; --muted:#a7adb8; --accent:#22c55e; }
    * { box-sizing:border-box; }
    body { margin:0; min-height:100vh; background:linear-gradient(135deg,#121417,#252b32); color:var(--text); font:15px/1.5 Inter, system-ui, sans-serif; }
    main { width:min(1180px, calc(100% - 28px)); margin:0 auto; padding:28px 0; display:grid; grid-template-columns:340px 1fr; gap:14px; }
    h1 { margin:0 0 12px; font-size:clamp(2rem, 5vw, 4rem); line-height:1; letter-spacing:0; }
    .panel { border:1px solid #ffffff22; border-radius:8px; background:#ffffff10; padding:16px; }
    label { display:grid; gap:6px; color:var(--muted); margin-bottom:12px; }
    input, select, textarea, button { border:1px solid #ffffff28; border-radius:8px; background:#10141a; color:var(--text); padding:10px 12px; font:inherit; }
    input[type=color] { height:48px; padding:4px; }
    button { cursor:pointer; }
    .drop { border:1px dashed #ffffff38; border-radius:8px; padding:18px; text-align:center; margin:12px 0; }
    .palette { display:grid; grid-template-columns:repeat(5,1fr); gap:10px; }
    .swatch { min-height:190px; border-radius:8px; padding:12px; display:flex; flex-direction:column; justify-content:flex-end; color:#111; box-shadow:inset 0 -60px 80px #0002; cursor:pointer; }
    .swatch.dark { color:#fff; }
    .preview { margin-top:14px; display:grid; grid-template-columns:1fr 1fr; gap:10px; }
    .mock { min-height:160px; border-radius:8px; padding:18px; }
    textarea { width:100%; min-height:160px; margin-top:14px; font:13px/1.45 ui-monospace, Consolas, monospace; }
    canvas { display:none; }
    @media (max-width:860px) { main { grid-template-columns:1fr; } .palette { grid-template-columns:1fr 1fr; } .preview { grid-template-columns:1fr; } }
  </style>
</head>
<body>
  <main>
    <aside class="panel">
      <h1>Palette Lab</h1>
      <p>Generate harmonies from a base color or extract a palette from an uploaded image.</p>
      <label>Base color<input id="base" type="color" value="#22c55e"></label>
      <label>Harmony<select id="mode"><option value="complementary">Complementary</option><option value="triadic">Triadic</option><option value="analogous">Analogous</option><option value="mono">Monochrome</option></select></label>
      <div class="drop" id="drop">Drop an image or choose a file<br><input id="file" type="file" accept="image/*"></div>
      <button id="copy">Copy CSS</button>
      <textarea id="css" spellcheck="false"></textarea>
      <canvas id="canvas"></canvas>
    </aside>
    <section>
      <div class="palette" id="palette"></div>
      <div class="preview" id="preview"></div>
    </section>
  </main>
  <script>
    const base = document.querySelector("#base"), mode = document.querySelector("#mode"), palette = document.querySelector("#palette"), css = document.querySelector("#css");
    function hexToHsl(hex) {
      let r = parseInt(hex.slice(1,3),16)/255, g = parseInt(hex.slice(3,5),16)/255, b = parseInt(hex.slice(5,7),16)/255;
      const max = Math.max(r,g,b), min = Math.min(r,g,b); let h=0, s=0, l=(max+min)/2;
      if (max !== min) { const d = max-min; s = l > .5 ? d/(2-max-min) : d/(max+min); h = max === r ? (g-b)/d + (g < b ? 6 : 0) : max === g ? (b-r)/d + 2 : (r-g)/d + 4; h *= 60; }
      return [h,s,l];
    }
    function hslToHex(h,s,l) {
      const a = s * Math.min(l, 1-l);
      const f = n => { const k = (n + h / 30) % 12; const c = l - a * Math.max(-1, Math.min(k - 3, Math.min(9 - k, 1))); return Math.round(255*c).toString(16).padStart(2,"0"); };
      return `#${f(0)}${f(8)}${f(4)}`;
    }
    function harmony(hex) {
      const [h,s,l] = hexToHsl(hex);
      const sets = { complementary:[0,180,210,30,150], triadic:[0,120,240,60,300], analogous:[0,20,40,-20,-40], mono:[0,0,0,0,0] };
      return sets[mode.value].map((d,i) => hslToHex((h+d+360)%360, Math.min(1, s * (i ? .86 + i*.04 : 1)), Math.max(.18, Math.min(.82, l + (i-2)*.08))));
    }
    function contrast(hex) {
      const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
      return (r*299 + g*587 + b*114) / 1000 < 130;
    }
    function render(colors = harmony(base.value)) {
      palette.innerHTML = colors.map((c,i) => `<button class="swatch ${contrast(c) ? "dark" : ""}" style="background:${c}" data-color="${c}"><strong>${c}</strong><span>Token ${i+1}</span></button>`).join("");
      css.value = `:root {\\n${colors.map((c,i) => `  --color-${i+1}: ${c};`).join("\\n")}\\n}`;
      document.querySelector("#preview").innerHTML = `<div class="mock" style="background:${colors[0]};color:${contrast(colors[0]) ? "#fff" : "#111"}"><h2>Primary surface</h2><p>Readable text preview.</p></div><div class="mock" style="background:linear-gradient(135deg,${colors[1]},${colors[3]});color:${contrast(colors[1]) ? "#fff" : "#111"}"><h2>Gradient card</h2><p>Harmony preview.</p></div>`;
    }
    function extract(file) {
      const img = new Image(), canvas = document.querySelector("#canvas"), ctx = canvas.getContext("2d");
      img.onload = () => {
        canvas.width = 80; canvas.height = 80; ctx.drawImage(img,0,0,80,80);
        const data = ctx.getImageData(0,0,80,80).data, buckets = {};
        for (let i=0; i<data.length; i+=16) {
          const r = Math.round(data[i]/32)*32, g = Math.round(data[i+1]/32)*32, b = Math.round(data[i+2]/32)*32;
          const key = `${r},${g},${b}`; buckets[key] = (buckets[key] || 0) + 1;
        }
        const colors = Object.entries(buckets).sort((a,b) => b[1]-a[1]).slice(0,5).map(([k]) => "#" + k.split(",").map(v => Math.min(255,+v).toString(16).padStart(2,"0")).join(""));
        render(colors);
      };
      img.src = URL.createObjectURL(file);
    }
    document.querySelector("#file").onchange = e => e.target.files[0] && extract(e.target.files[0]);
    document.querySelector("#drop").ondragover = e => e.preventDefault();
    document.querySelector("#drop").ondrop = e => { e.preventDefault(); if (e.dataTransfer.files[0]) extract(e.dataTransfer.files[0]); };
    palette.onclick = e => { const swatch = e.target.closest(".swatch"); if (swatch) navigator.clipboard.writeText(swatch.dataset.color); };
    document.querySelector("#copy").onclick = () => navigator.clipboard.writeText(css.value);
    base.oninput = () => render(); mode.onchange = () => render(); render();
  </script>
</body>
</html>
